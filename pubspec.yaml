name: my_pesa
description: "My Cash Manager"

publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: ^3.11.4


dependencies:
  flutter:
    sdk: flutter

 
  cupertino_icons: ^1.0.8
  google_fonts: ^8.1.0
  get: ^4.7.3
  get_storage: ^2.1.1
  share_plus: ^13.1.0
  lottie: ^3.3.3
  flutter_launcher_icons: ^0.14.4
  video_player: ^2.11.1
  package_info_plus: ^10.1.0
  http: ^1.6.0
  web_socket_channel: ^3.0.3
  intl: ^0.20.2

flutter_icons:
  android: true
  ios: true
  image_path: 'assets/logos/my-pesa-logo.png'
  adaptive_icon_background: "#ffffff"
  

dev_dependencies:
  flutter_test:
    sdk: flutter


  flutter_lints: ^6.0.0


flutter:


  uses-material-design: true

  assets: 
    - assets/images/
    - assets/logos/
   
